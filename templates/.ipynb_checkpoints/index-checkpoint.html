<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Car Price Predictor</title>

    <link rel="stylesheet" href="static/css/style.css">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card p-4 shadow-lg" style="width: 600px; border-radius: 15px;">

        <div style="text-align: center">
            <h2>🚗 Car Price Predictor</h2>
            <p class="text-muted">Enter details to estimate your car price</p>
        </div>

        <form method="post" name="Modelform">

            <!-- Company -->
            <div class="form-group">
                <label><b>Select the company:</b></label>
                <select class="form-control" id="company" name="company"
                        onchange="load_car_models(this.id,'car_models')">
                    {% for company in companies %}
                    <option value="{{ company }}">{{ company }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Model -->
            <div class="form-group">
                <label><b>Select the model:</b></label>
                <select class="form-control" id="car_models" name="car_models"></select>
            </div>

            <!-- Year -->
            <div class="form-group">
                <label><b>Select Year of Purchase:</b></label>
                <select class="form-control" id="year" name="year">
                    {% for year in years %}
                    <option value="{{ year }}">{{ year }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Fuel -->
            <div class="form-group">
                <label><b>Select the Fuel Type:</b></label>
                <select class="form-control" id="fuel_type" name="fuel_type">
                    {% for fuel in fuel_types %}
                    <option value="{{ fuel }}">{{ fuel }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- KM Driven -->
            <div class="form-group">
                <label><b>Kilometres Driven:</b></label>
                <input type="number" class="form-control" id="kms_driven" name="kms_driven"
                       placeholder="Enter kilometres driven">
            </div>

            <!-- Button -->
            <div class="form-group">
                <button type="button" class="btn btn-primary form-control"
                        onclick="send_data()">
                    🚀 Predict Price
                </button>
            </div>

        </form>

        <!-- Prediction -->
        <div class="text-center mt-3">
            <h4 id="prediction"></h4>
        </div>

    </div>
</div>

<script>

function load_car_models(company_id,car_model_id)
{
    var company=document.getElementById(company_id);
    var car_model= document.getElementById(car_model_id);

    car_model.innerHTML="";

    {% for company in companies %}
        if( company.value == "{{ company }}")
        {
            {% for model in car_models %}
                {% if company in model %}
                    var newOption= document.createElement("option");
                    newOption.value="{{ model }}";
                    newOption.innerHTML="{{ model }}";
                    car_model.options.add(newOption);
                {% endif %}
            {% endfor %}
        }
    {% endfor %}
}

function form_handler(event) {
    event.preventDefault();
}

function send_data()
{
    document.querySelector('form').addEventListener("submit",form_handler);

    var fd=new FormData(document.querySelector('form'));

    var xhr= new XMLHttpRequest();

    xhr.open('POST','/predict',true);

    document.getElementById('prediction').innerHTML="⏳ Predicting...";

    xhr.onreadystatechange = function(){
        if(xhr.readyState == XMLHttpRequest.DONE){
            document.getElementById('prediction').innerHTML =
                "💰 Estimated Price: ₹ " + xhr.responseText;
        }
    };

    xhr.send(fd);
}

</script>

</body>
</html>
